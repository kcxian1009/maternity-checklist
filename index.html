  const setItemData = (id, data) => { setChecklist(prev => ({ ...prev, [id]: { ...getItemData(id), ...data } })); };
  const getSectionNoteId = (section) => `${activeTab}-${section}-NOTE`;
  const getSectionNote = (section) => checklist[getSectionNoteId(section)] || '';
  const setSectionNote = (section, note) => { setChecklist(prev => ({ ...prev, [getSectionNoteId(section)]: note })); };
  const allData = activeTab === 'delivery' ? deliveryData : activeTab === 'confinement' ? confinementData : null;

  const calcToBuyCount = () => {
    let count = 0;
    [deliveryData, confinementData].forEach((data, i) => {
      const tab = i === 0 ? 'delivery' : 'confinement';
      Object.entries(data).forEach(([section, items]) => {
        items.forEach((_, index) => {
          const id = `${tab}-${section}-${index}`;
          if ((checklist[id] || {}).status === 'toBuy' && !deletedItems.has(id)) count++;
        });
        Object.entries(checklist).forEach(([id, d]) => {
          if (id.startsWith(tab + '-' + section + '-custom-') && !deletedItems.has(id) && d.status === 'toBuy') count++;
        });
      });
    });
    return count;
  };
  const toBuyCount = calcToBuyCount();

  let totalItems = 0, checkedItems = 0;
  if (allData) {
    Object.entries(allData).forEach(([section, items]) => {
      items.forEach((_, index) => {
        const id = getItemId(section, index);
        if (deletedItems.has(id)) return;
        totalItems++;
        if (getItemData(id).status === 'done') checkedItems++;

    });
  }

  // ====== URL 轉換函數 ======
  const parseUrlsInText = (text) => {
    if (!text) return '';
    // 正則表達式匹配 HTTP(S) URL
    const urlRegex = /(https?:\/\/[^\s]+)/g;
    const parts = text.split(urlRegex);
    
    return parts.map((part, idx) => {
      if (urlRegex.test(part)) {
        return (
          <a key={idx} href={part} target="_blank" rel="noopener noreferrer" style={{color: colors.secondary, textDecoration: 'underline', fontWeight: 'bold'}} className="hover:opacity-75">
            🔗 {part.replace(/^https?:\/\//, '').substring(0, 40)}...
          </a>
        );
      }
      return <span key={idx}>{part}</span>;
    });
  };
  // ====== useEffect ======
  useEffect(() => {
    const allSections = {};
    Object.keys(deliveryData).forEach(s => allSections[s] = true);
    Object.keys(confinementData).forEach(s => allSections[s] = true);
    setExpandedSections(allSections);
    
    // 從 Firebase 載入數據
    setIsSyncing(true);
    
    const checklistRef = database.ref(`sessions/${sessionId}/checklist`);
    const deletedRef = database.ref(`sessions/${sessionId}/deletedItems`);
    const shoppingRef = database.ref(`sessions/${sessionId}/shoppingList`);
    
    checklistRef.on('value', (snapshot) => {
      if (snapshot.exists()) {
        setChecklist(snapshot.val());
      } else {
        setChecklist(initialChecklistData);
        checklistRef.set(initialChecklistData);
      }
      fbLoaded.current = true;
      setIsSyncing(false);
    }, (error) => {
      console.error('Firebase 載入錯誤:', error);
      const saved = localStorage.getItem('maternity-checklist');
      if (saved) {
        try { setChecklist(JSON.parse(saved)); } catch(e) { setChecklist(initialChecklistData); }
      } else {
        setChecklist(initialChecklistData);
      }
      fbLoaded.current = true;
      setIsSyncing(false);
    });
    
    deletedRef.on('value', (snapshot) => {
      if (snapshot.exists() && Array.isArray(snapshot.val())) {
        setDeletedItems(new Set(snapshot.val()));
      }
    });
    
    shoppingRef.on('value', (snapshot) => {
      if (snapshot.exists()) {
        const val = snapshot.val();
        if (Array.isArray(val)) {
          // 確保每個 item 都有 prices 陣列
          setShoppingList(val.map(item => ({ ...item, prices: Array.isArray(item.prices) ? item.prices : [] })));
        } else {
          setShoppingList([]);
        }
      } else {
        setShoppingList([]);
      }
    });

    // ✅ 清理 Firebase 監聽，防止記憶體洩漏
    return () => {
      checklistRef.off();
      deletedRef.off();
      shoppingRef.off();
    };
  }, [sessionId]);

  // 購物清單在上面的 Firebase useEffect 中已載入

  useEffect(() => {

            database.ref(`sessions/${sessionId}/checklist`).set(data.checklist);

          if (data.shoppingList) {

  // ====== 渲染：待買清單卡片（可編輯比價） ======

        </div>

          <button onClick={() => startEdit(id, note, item.name || item)} className="p-2 hover:bg-gray-100 rounded-lg" title="編輯名稱備註">

          <input type="text" inputMode="numeric" value={quantity} onChange={(e) => updateQuantity(id, 'quantity', e.target.value.replace(/\D/g, '') || '0')} style={{borderColor: colors.secondary}} className="w-12 px-1 py-0.5 border rounded text-sm text-center font-bold focus:outline-none" />
        </div>
        <div className="flex items-center gap-1">
          <span style={{color: colors.textMute}}>已有：</span>
          <input type="text" inputMode="numeric" value={currentQuantity} onChange={(e) => updateQuantity(id, 'currentQuantity', e.target.value.replace(/\D/g, '') || '0')} style={{borderColor: colors.secondary}} className="w-12 px-1 py-0.5 border rounded text-sm text-center font-bold focus:outline-none" />
        </div>

      {editingToBuyPriceId === id ? (

          <p style={{color: colors.dark}} className="text-sm font-semibold mb-1">💰 比價：</p>

                  <div className="flex items-center justify-between gap-2">

                      <button onClick={() => editPrice(id, idx)} className="p-1 hover:bg-gray-100 rounded"><Edit2 className="w-3 h-3" style={{color: colors.secondary}} /></button>

                    <a href={p.link} target="_blank" rel="noopener noreferrer" style={{color: colors.accent}} className="text-xs hover:opacity-75 block mt-1">🔗 查看商品</a>

                <button onClick={() => saveEditPrice(id)} style={{backgroundColor: colors.secondary}} className="flex-1 text-white px-2 py-1 rounded text-sm font-semibold">✓ 保存</button>

            </div>

                  document.getElementById(`tb-link-${id}`).value = '';

                  removeShoppingPrice(deleteConfirm.id, deleteConfirm.pIdx);

                  removePrice(deleteConfirm.id, deleteConfirm.pIdx);

                setDeleteConfirmId(null);

            </div>

          </div>
          <div className="flex gap-2">

            <button onClick={() => (window.scrollTo(0, 0), setActiveTab('shopping'))} style={{backgroundColor: activeTab === 'shopping' ? colors.accent : 'white', color: activeTab === 'shopping' ? 'white' : colors.text, borderBottom: activeTab === 'shopping' ? 'none' : `2px solid ${colors.accent}`}} className="flex-1 py-2 rounded-lg font-semibold text-sm transition-all">

        </div>

      {/* Content */}

        {/* ===== 待產包 / 月中準備 ===== */}

            {Object.entries(allData).map(([section, items]) => (
              <div key={section} className="mb-4">

                  <div className="flex items-center gap-2">
                    <span style={{color: colors.dark}} className="text-sm font-semibold">
                      {(() => { let done=0, have=0, buy=0, total=0; items.forEach((_,i) => { const id=getItemId(section,i); if(deletedItems.has(id))return; total++; const s=getItemData(id).status; if(s==='done')done++; if(s==='have')have++; if(s==='toBuy')buy++; }); let r=`${done}/${total}`; if(have>0)r+=` (已${have})`; if(buy>0)r+=` (待${buy})`; return r; })()}

                    {expandedSections[section] ? <ChevronUp className="w-5 h-5" style={{color: colors.primary}} /> : <ChevronDown className="w-5 h-5" style={{color: colors.primary}} />}

                {expandedSections[section] && (
                  <div className="mt-2 space-y-2">
                    {items.map((item, index) => {
                      const itemId = getItemId(section, index);
                      if (deletedItems.has(itemId)) return null;
                      return renderItem(item, index, section);
                    })}
                    {/* 渲染用戶自行新增的品項 */}
                    {Object.entries(checklist).filter(([id]) =>
                      id.startsWith(activeTab + '-' + section + '-custom-') && !deletedItems.has(id)

                        <div style={{backgroundColor: d.status === 'done' ? '#f0c8b7' : d.status === 'have' ? '#f9e8e3' : d.status === 'toBuy' ? '#fffaf0' : '#fff9f7', borderLeft: `4px solid ${d.status === 'done' ? colors.primary : d.status === 'have' ? '#a0aec0' : d.status === 'toBuy' ? colors.secondary : '#e2e8f0'}`}} className="flex items-start gap-3 p-3">
                          <button onClick={() => cycleStatus(id)} className="mt-1 flex-shrink-0 p-2 rounded-full hover:bg-gray-100 active:scale-95 transition-all">

                            {d.status === 'toBuy' && React.createElement(ShoppingCart, {className:'w-7 h-7', style:{color:colors.secondary}})}
                            {d.status === 'pending' && React.createElement(Circle, {className:'w-7 h-7 text-gray-300'})}

          })()
        ) : activeTab === 'shopping' ? (
          <div className="space-y-4">
            <div style={{backgroundColor: 'white', borderColor: colors.accent}} className="border-2 rounded-lg p-4">
              <button onClick={() => setShowShoppingForm(true)} style={{backgroundColor: colors.accent, width: '100%'}} className="px-4 py-3 text-white rounded-lg hover:opacity-90 font-semibold text-lg">+ 新增購物項目</button>
            </div>

            {showShoppingForm && (
              <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center p-4 z-50">
                <div style={{backgroundColor: 'white', borderColor: colors.accent}} className="border-2 rounded-lg p-6 w-full max-w-md max-h-screen overflow-y-auto">
                  <h2 style={{color: colors.dark}} className="text-xl font-bold mb-4">新增購物項目</h2>
                  
                  <div className="space-y-3">
                    <div>
                      <label style={{color: colors.text}} className="block text-sm font-semibold mb-1">項目名稱 *</label>
                      <input type="text" value={formData.name} onChange={(e) => setFormData({...formData, name: e.target.value})} placeholder="例：尿布、奶瓶..." style={{borderColor: colors.accent, color: colors.text}} className="w-full px-3 py-2 border rounded-lg focus:outline-none" />
                    </div>

                    <div>
                      <label style={{color: colors.text}} className="block text-sm font-semibold mb-1">商品連結（可多個）</label>
                      <div className="space-y-2">
                        {formLinks.map((link, idx) => (
                          <div key={link.id} className="flex gap-2">
                            <input type="url" value={link.url} onChange={(e) => {
                              const newLinks = [...formLinks];
                              newLinks[idx].url = e.target.value;
                              setFormLinks(newLinks);
                            }} placeholder="http://..." style={{borderColor: colors.accent, color: colors.text}} className="flex-1 px-3 py-2 border rounded-lg focus:outline-none text-sm" />
                            {formLinks.length > 1 && (
                              <button onClick={() => setFormLinks(formLinks.filter((_, i) => i !== idx))} className="px-3 py-2 bg-red-100 text-red-500 rounded-lg hover:bg-red-200">✕</button>
                            )}
                          </div>
                        ))}
                        <button onClick={() => setFormLinks([...formLinks, { id: Date.now(), url: '' }])} style={{color: colors.accent, borderColor: colors.accent}} className="w-full px-3 py-2 border rounded-lg hover:bg-gray-50 text-sm font-semibold">+ 新增連結</button>
                      </div>
                    </div>

                    <div>
                      <label style={{color: colors.text}} className="block text-sm font-semibold mb-1">備註</label>
                      <textarea value={formData.note} onChange={(e) => setFormData({...formData, note: e.target.value})} placeholder="例：要粉紅色、尺寸M..." style={{borderColor: colors.accent, color: colors.text}} className="w-full px-3 py-2 border rounded-lg focus:outline-none text-sm h-20 resize-none" />
                    </div>

                    <div className="pt-2 border-t" style={{borderColor: colors.accent}}>
                      <label style={{color: colors.text}} className="block text-sm font-semibold mb-2">💰 比價資訊（選填）</label>
                      <div className="space-y-2">
                        {formPrices.map((price, idx) => (
                          <div key={idx} className="space-y-2 p-2 bg-gray-50 rounded-lg">
                            <div className="flex gap-2">
                              <input type="number" value={price.price} onChange={(e) => {
                                const newPrices = [...formPrices];
                                newPrices[idx].price = e.target.value;
                                setFormPrices(newPrices);
                              }} placeholder="價格" style={{borderColor: colors.accent, color: colors.text}} className="w-20 px-2 py-1 border rounded text-sm" />
                              <input type="text" value={price.shop} onChange={(e) => {
                                const newPrices = [...formPrices];
                                newPrices[idx].shop = e.target.value;
                                setFormPrices(newPrices);
                              }} placeholder="店鋪" style={{borderColor: colors.accent, color: colors.text}} className="flex-1 px-2 py-1 border rounded text-sm" />
                              {formPrices.length > 1 && (
                                <button onClick={() => setFormPrices(formPrices.filter((_, i) => i !== idx))} className="px-2 py-1 bg-red-100 text-red-500 rounded hover:bg-red-200">✕</button>
                              )}
                            </div>
                            <input type="url" value={price.link} onChange={(e) => {
                              const newPrices = [...formPrices];
                              newPrices[idx].link = e.target.value;
                              setFormPrices(newPrices);
                            }} placeholder="商品連結（選填）" style={{borderColor: colors.accent, color: colors.text}} className="w-full px-2 py-1 border rounded text-sm" />
                          </div>
                        ))}
                        <button onClick={() => setFormPrices([...formPrices, { price: '', shop: '', link: '', date: new Date().toLocaleDateString('zh-TW') }])} style={{color: colors.accent, borderColor: colors.accent}} className="w-full px-3 py-2 border rounded-lg hover:bg-gray-50 text-sm font-semibold">+ 新增比價</button>
                      </div>
                    </div>
                  </div>

                  <div className="flex gap-2 mt-4">
                    <button onClick={addShoppingItem} style={{backgroundColor: colors.accent}} className="flex-1 px-4 py-2 text-white rounded-lg hover:opacity-90 font-semibold">新增</button>
                    <button onClick={() => { setShowShoppingForm(false); setFormData({ name: '', link: '', note: '' }); setFormLinks([{ id: Date.now(), url: '' }]); setFormPrices([]); }} className="flex-1 px-4 py-2 bg-gray-300 text-gray-700 rounded-lg hover:bg-gray-400 font-semibold">取消</button>
                  </div>
                </div>
              </div>
            )}

            {(shoppingList || []).length === 0 ? (
              <div className="text-center py-12">
                <ShoppingCart className="w-12 h-12 mx-auto mb-4 opacity-50" style={{color: colors.accent}} />
                <p style={{color: colors.text}} className="text-lg">購物清單是空的</p>
                <p style={{color: colors.textMute}} className="text-sm mt-2">新增你要購買的商品吧！</p>
              </div>
            ) : (
              <div className="space-y-3">
                {(shoppingList || []).map((si) => (
                  <div key={si.id} style={{backgroundColor: si.purchased ? '#f0f7ff' : 'white', borderColor: si.purchased ? colors.accent : '#e2e8f0', borderWidth: '2px'}} className="p-4 rounded-lg transition-all">
                    <div className="flex items-center gap-3 mb-2">
                      <button onClick={() => toggleShoppingPurchased(si.id)} className="flex-shrink-0 transition-all hover:scale-110">
                        {si.purchased ? <CheckCircle2 className="w-6 h-6" style={{color: colors.accent}} /> : <Circle className="w-6 h-6 text-gray-400" />}
                      </button>
                      {editingShoppingId === si.id ? (
                        <div className="flex-1">
                          <div className="flex gap-2 mb-2">
                            <input type="text" value={editingShoppingName} onChange={(e) => setEditingShoppingName(e.target.value)} onKeyDown={(e) => { if (e.key === 'Enter') saveEditShopping(si.id); }} style={{borderColor: colors.accent, color: colors.text}} className="flex-1 px-2 py-1 border rounded text-sm font-semibold focus:outline-none" autoFocus />
                            <button onClick={() => saveEditShopping(si.id)} style={{backgroundColor: colors.accent}} className="px-2 py-1 text-white rounded text-sm">✓</button>
                            <button onClick={() => setEditingShoppingId(null)} className="px-2 py-1 bg-gray-300 rounded text-sm">✕</button>
                          </div>
                          <input type="url" value={si.link || ''} onChange={(e) => saveShoppingList(shoppingList.map(i => i.id === si.id ? { ...i, link: e.target.value } : i))} placeholder="貼上商品連結 (http://...)" style={{borderColor: colors.accent}} className="w-full px-2 py-1 border rounded text-sm mb-2" />
                          <textarea value={si.note || ''} onChange={(e) => saveShoppingList(shoppingList.map(i => i.id === si.id ? { ...i, note: e.target.value } : i))} placeholder="備註（例：要粉紅色、尺寸M...）" style={{borderColor: colors.accent}} className="w-full px-2 py-1 border rounded text-sm h-16 resize-none" />
                        </div>
                      ) : (
                        <div className="flex-1">
                          <div className="flex items-center gap-2">
                            <span style={{color: si.purchased ? '#a0aec0' : colors.text, textDecoration: si.purchased ? 'line-through' : 'none'}} className="font-semibold">{si.name}</span>
                            {si.link && (
                              <a href={si.link} target="_blank" rel="noopener noreferrer" style={{color: colors.accent}} className="text-xs hover:opacity-75">🔗</a>
                            )}
                          </div>
                          {si.note && (
                            <div style={{color: colors.dark, fontSize: '12px'}} className="mt-1 text-xs">📝 {si.note}</div>
                          )}
                        </div>
                      )}
                      <button onClick={() => startEditShopping(si.id, si.name)} className="p-2 hover:bg-gray-100 rounded"><Edit2 className="w-4 h-4" style={{color: colors.accent}} /></button>
                      {deleteShoppingConfirmId === si.id ? (
                        <div className="flex gap-1 flex-shrink-0">
                          <button onClick={() => { setDeleteShoppingConfirmId(null); setDeleteConfirm({ id: si.id, name: si.name, type: 'shopping' }); }} style={{backgroundColor: '#dc2626'}} className="px-3 py-1 text-white text-xs rounded font-bold">刪</button>
                          <button onClick={() => setDeleteShoppingConfirmId(null)} className="px-3 py-1 bg-gray-300 text-gray-700 text-xs rounded font-bold">取消</button>
                        </div>
                      ) : (
                        <button onClick={(e) => { e.stopPropagation(); setDeleteShoppingConfirmId(si.id); }} className="p-2 hover:bg-red-100 rounded"><X className="w-4 h-4 text-red-500" /></button>
                      )}
                    </div>

                    {(si.prices || []).length > 0 && (
                      <div className="space-y-1 mb-2">
                        {(si.prices || []).map((p, idx) => (
                          <div key={idx} style={{backgroundColor: '#f0f7ff', border: '1px solid ' + colors.accent}} className="p-2 rounded-lg text-sm">
                            <div className="flex items-center justify-between gap-2">
                              <span><span className="font-bold">${p.price}</span> @ <span style={{color: colors.dark}}>{p.shop}</span> <span className="text-gray-400">({p.date})</span></span>
                              <button onClick={() => setDeleteConfirm({ id: si.id, name: '$' + p.price + ' @ ' + p.shop, type: "shoppingPrice", pIdx: idx })} className="p-1 hover:bg-red-100 rounded"><X className="w-3 h-3 text-red-500" /></button>
                            </div>
                            {p.link && (
                              <a href={p.link} target="_blank" rel="noopener noreferrer" style={{color: colors.accent}} className="text-xs hover:opacity-75 block mt-1">🔗 查看商品</a>
                            )}
                          </div>
                        ))}
                      </div>
                    )}

                    <div className="space-y-2 text-sm">
                      <div className="flex gap-2">
                        <input type="number" placeholder="價格" id={`sp-${si.id}`} style={{borderColor: colors.accent}} className="w-20 px-2 py-1 border rounded text-sm" />
                        <input type="text" placeholder="店鋪" id={`ss-${si.id}`} style={{borderColor: colors.accent}} className="flex-1 px-2 py-1 border rounded text-sm" />
                      </div>
                      <input type="url" placeholder="商品連結（選填）" id={`sl-${si.id}`} style={{borderColor: colors.accent}} className="w-full px-2 py-1 border rounded text-sm" />
                      <button onClick={() => {
                        const p = document.getElementById(`sp-${si.id}`).value;
                        const s = document.getElementById(`ss-${si.id}`).value;
                        const l = document.getElementById(`sl-${si.id}`).value;
                        if (p && s) { 
                          addShoppingPrice(si.id, p, s, new Date().toLocaleDateString('zh-TW'), l);
                          document.getElementById(`sp-${si.id}`).value = '';
                          document.getElementById(`ss-${si.id}`).value = '';
                          document.getElementById(`sl-${si.id}`).value = '';
                        }
                      }} style={{backgroundColor: colors.accent}} className="w-full px-3 py-1 text-white rounded text-sm font-semibold">+ 比價</button>
                    </div>
                  </div>
                ))}
              </div>
            )}
          </div>
        ) : null}

        {/* Firebase 同步狀態 */}
        {isSyncing && (
          <div className="fixed top-4 right-4 bg-blue-500 text-white px-4 py-2 rounded-lg flex items-center gap-2 text-sm">
            <div className="w-3 h-3 bg-white rounded-full animate-pulse"></div>
            同步中...
          </div>
        )}

        {/* 底部按鈕 */}
        <div className="mt-8 flex flex-col items-center gap-3">
          <div className="flex gap-3">
            <button onClick={exportData} style={{backgroundColor: 'white', color: colors.primary, borderColor: colors.primary}} className="flex items-center gap-2 px-4 py-2 border-2 rounded-lg hover:bg-gray-50 text-sm font-semibold">
              <Download className="w-4 h-4" />匯出備份
            </button>
            <button onClick={importData} style={{backgroundColor: 'white', color: colors.primary, borderColor: colors.primary}} className="flex items-center gap-2 px-4 py-2 border-2 rounded-lg hover:bg-gray-50 text-sm font-semibold">
              <Upload className="w-4 h-4" />匯入備份
            </button>
          </div>
          {(activeTab === 'delivery' || activeTab === 'confinement') && (
            <button onClick={resetAll} style={{backgroundColor: 'white', color: colors.primary, borderColor: colors.primary}} className="flex items-center gap-2 px-6 py-3 border-2 rounded-lg hover:bg-gray-50 font-semibold">
              <RotateCcw className="w-4 h-4" />清除所有進度
            </button>
          )}
        </div>
      </div>
    </div>
  );
}


// 掛載應用
const rootElement = document.getElementById('root');
const root = ReactDOM.createRoot(rootElement);
root.render(React.createElement(MaternityChecklist));

    </script>
</body>
</html>
